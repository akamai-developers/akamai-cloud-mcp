name: Pricing staleness

# Scheduled live check. This is the only job that catches real catalog drift.
# The public type/price endpoints it reads are unauthenticated, so it needs no
# Linode credentials.

on:
  schedule:
    # Weekly, Monday 13:00 UTC.
    - cron: "0 13 * * 1"
  workflow_dispatch:

jobs:
  staleness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Check live pricing against the baseline
        run: uv run python scripts/check_staleness.py
